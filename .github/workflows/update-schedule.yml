name: Update Schedule Data

on:
  schedule:
    # Суббота 09:00 МСК (06:00 UTC)
    - cron: "0 6 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Calculate next Monday date
        id: next_monday
        run: |
          NEXT_MONDAY_DATE=$(node -e "
            const now = new Date();
            const day = now.getUTCDay();
            let diff = (8 - day) % 7;
            if (diff === 0) diff = 7;
            const nextMonday = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + diff));
            console.log(nextMonday.toISOString().slice(0, 10));
          ")
          echo "date=$NEXT_MONDAY_DATE" >> "$GITHUB_OUTPUT"

      - name: Generate schedule data
        env:
          NEXT_MONDAY_DATE: ${{ steps.next_monday.outputs.date }}
        run: |
          SCHEDULE_URL="https://schedule.mstimetables.ru/publications/4f2464cf-c4d1-4f55-b67a-2f8de64f5ba6#/groups/38/lessons?date=${NEXT_MONDAY_DATE}"
          pnpm run generate-schedule -- "$SCHEDULE_URL"

      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet -- src/data/structured-schedule-data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/structured-schedule-data.json
          git commit -m "chore: update schedule data"
          git push origin main

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No schedule changes detected."
